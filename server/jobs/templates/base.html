<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Notebook Ops Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="csrf-token" content="{{ csrf_token }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a href="{% url 'dashboard' %}" class="navbar-brand text-decoration-none">Notebook Ops Platform</a>
        
        <div class="d-flex gap-2 align-items-center">
            {% if user.is_authenticated %}
                <a href="{% url 'upload_notebook' %}" class="btn btn-outline-light btn-sm">+ Upload New Notebook</a>
                
                {% if user.is_staff or user.is_superuser %}
                    <a href="{% url 'admin:index' %}" class="btn btn-outline-info btn-sm">Admin Panel</a>
                {% endif %}
                
                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}
{% endblock %}

</body>
</html>
