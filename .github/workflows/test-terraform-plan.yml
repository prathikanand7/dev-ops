name: "Terraform CI"

on:
  push:
    paths:
      - "lifewatch_batch_platform/terraform/**"
      - ".github/workflows/test-terraform-plan.yml"
  pull_request:
    paths:
      - "lifewatch_batch_platform/terraform/**"
      - ".github/workflows/test-terraform-plan.yml"
concurrency:
  group: terraform-batch-dev-state
  cancel-in-progress: false

permissions:
  contents: read

env:
  TERRAFORM_ENV_DIR: ${{ secrets.TERRAFORM_ENV_DIR }}

jobs:
  terraform:
    name: "Terraform Plan"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_ENV_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: |
          terraform plan \
            -lock=false \
            -input=false \
            -no-color \
            -var="container_image=${{ secrets.CONTAINER_IMAGE }}" \
            -var="batch_execution_role_arn=${{ secrets.BATCH_EXECUTION_ROLE_ARN }}"

      - name: Terraform Test
        if: ${{ hashFiles(format('{0}/**/*.tftest.hcl', env.TERRAFORM_ENV_DIR)) != '' }}
        run: terraform test
