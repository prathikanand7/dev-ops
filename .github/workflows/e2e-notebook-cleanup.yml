name: Notebook E2E Cleanup

on:
  workflow_run:
    workflows: ["Notebook E2E Deploy and Run"]
    types: [completed]

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1

concurrency:
  group: terraform-batch-dev-state
  cancel-in-progress: false

jobs:
  cleanup:
    name: Force Terraform Destroy and EC2 Cleanup Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy Except Payload Bucket
        working-directory: ./terraform/environments/batch-dev
        run: |
          set -euo pipefail
          terraform init
          mapfile -t targets < <(terraform state list | grep -v '^aws_s3_bucket.batch_payloads$' || true)
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "Nothing to destroy."
            exit 0
          fi
          args=()
          for t in "${targets[@]}"; do
            args+=("-target=$t")
          done
          terraform destroy -lock-timeout=20m -auto-approve "${args[@]}"

      - name: Verify No Batch EC2 Instances Remain
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            COUNT=$(aws ec2 describe-instances \
              --region "${AWS_REGION}" \
              --filters "Name=tag:Name,Values=lifewatch-batch-ec2-200gb" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
              --query "length(Reservations[].Instances[])" \
              --output text)
            if [ "${COUNT}" = "0" ]; then
              echo "No Batch EC2 instances remain."
              exit 0
            fi
            echo "Waiting for Batch EC2 cleanup... remaining instances: ${COUNT} (attempt ${attempt}/30)"
            sleep 20
          done
          echo "Batch EC2 cleanup check failed. Instances are still present."
          aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=lifewatch-batch-ec2-200gb" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
            --query "Reservations[].Instances[].{Id:InstanceId,State:State.Name,LaunchTime:LaunchTime,AZ:Placement.AvailabilityZone}" \
            --output table
          exit 1
