name: Notebook E2E EC2 Cleanup
# Catch any lingering EC2 in edge case of early termination of E2E notebook deploy and run

on:
  workflow_run:
    workflows: ["Notebook E2E Deploy and Run"]
    types: [completed]

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1

concurrency:
  group: terraform-batch-dev-state
  cancel-in-progress: false

jobs:
  cleanup:
    name: Force Batch EC2 Cleanup
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terminate and Verify No Batch EC2 Instances Remain
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            INSTANCE_IDS_RAW=$(aws ec2 describe-instances \
              --region "${AWS_REGION}" \
              --filters "Name=tag:Name,Values=lifewatch-batch-ec2-*" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
              --query "Reservations[].Instances[].InstanceId" \
              --output text)

            if [ -z "${INSTANCE_IDS_RAW}" ] || [ "${INSTANCE_IDS_RAW}" = "None" ]; then
              echo "No Batch EC2 instances remain."
              break
            fi

            mapfile -t INSTANCE_IDS < <(printf '%s\n' "${INSTANCE_IDS_RAW}" | tr '\t' '\n' | sed '/^$/d')
            if [ "${#INSTANCE_IDS[@]}" -gt 0 ]; then
              echo "Found lingering Batch EC2 instances (attempt ${attempt}/36): ${INSTANCE_IDS[*]}"
              aws ec2 terminate-instances \
                --region "${AWS_REGION}" \
                --instance-ids "${INSTANCE_IDS[@]}" >/dev/null
            fi
            sleep 10
          done

          FINAL_COUNT=$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=lifewatch-batch-ec2-*" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
            --query "length(Reservations[].Instances[])" \
            --output text)

          if [ "${FINAL_COUNT}" != "0" ]; then
            echo "Batch EC2 cleanup failed. Instances still present: ${FINAL_COUNT}"
            aws ec2 describe-instances \
              --region "${AWS_REGION}" \
              --filters "Name=tag:Name,Values=lifewatch-batch-ec2-*" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
              --query "Reservations[].Instances[].{Id:InstanceId,State:State.Name,LaunchTime:LaunchTime,AZ:Placement.AvailabilityZone,Name:Tags[?Key=='Name']|[0].Value}" \
              --output table
            exit 1
          fi

          echo "EC2-only cleanup complete. Terraform infrastructure was left intact."
