name: Notebook E2E Cleanup

on:
  workflow_run:
    workflows: ["Notebook E2E Deploy and Run"]
    types: [completed]

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1

concurrency:
  group: terraform-batch-dev-state
  cancel-in-progress: false

jobs:
  cleanup:
    name: Force Terraform Destroy and EC2 Cleanup Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Destroy (Keep Non-Empty Payload Bucket)
        working-directory: ./lifewatch_batch_platform/terraform/environments/dev
        run: |
          set -euo pipefail
          terraform init -input=false
          set +e
          terraform destroy \
            -lock-timeout=20m \
            -auto-approve \
            -no-color \
            -var="container_image=${{ secrets.CONTAINER_IMAGE }}" \
            -var="batch_execution_role_arn=${{ secrets.BATCH_EXECUTION_ROLE_ARN }}" \
            2>&1 | tee /tmp/terraform-destroy.log
          destroy_exit=${PIPESTATUS[0]}
          set -e

          if [ "${destroy_exit}" -ne 0 ]; then
            if grep -q "BucketNotEmpty" /tmp/terraform-destroy.log && grep -q "lifewatch-batch-payloads-" /tmp/terraform-destroy.log; then
              echo "Ignoring expected BucketNotEmpty on payload bucket to preserve data."
            else
              echo "Terraform destroy failed with unexpected error."
              exit "${destroy_exit}"
            fi
          fi

      - name: Verify No Batch EC2 Instances Remain
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            COUNT=$(aws ec2 describe-instances \
              --region "${AWS_REGION}" \
              --filters "Name=tag:Name,Values=lifewatch-batch-ec2-200gb" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
              --query "length(Reservations[].Instances[])" \
              --output text)
            if [ "${COUNT}" = "0" ]; then
              echo "No Batch EC2 instances remain."
              exit 0
            fi
            echo "Waiting for Batch EC2 cleanup... remaining instances: ${COUNT} (attempt ${attempt}/30)"
            sleep 20
          done
          echo "Batch EC2 cleanup check failed. Instances are still present."
          aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=lifewatch-batch-ec2-200gb" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
            --query "Reservations[].Instances[].{Id:InstanceId,State:State.Name,LaunchTime:LaunchTime,AZ:Placement.AvailabilityZone}" \
            --output table
          exit 1
