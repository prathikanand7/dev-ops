name: Deploy Worker Image to ECR
# This workflow builds the worker image and pushes it to ECR.
# Triggered after successful completion of the smoke test workflow, or manually via workflow_dispatch.

on:
  workflow_run:
    workflows: ["Smoke Test Worker Containerisation"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: r-notebook-worker

concurrency:
  group: deploy-worker-ecr-main
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Build and Push Worker Image
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Resolve deployment metadata
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=worker-ecr-cache
          cache-to: type=gha,mode=max,scope=worker-ecr-cache

      - name: Print Published Tags
        run: |
          echo "Published images:"
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}"
