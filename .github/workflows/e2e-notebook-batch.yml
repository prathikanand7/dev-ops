name: Notebook E2E Deploy and Run

on:
  push:
    branches:
      - "feature/endtoend-test"
  workflow_run:
    workflows: ["Deploy Worker Image to ECR"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1

concurrency:
  group: terraform-batch-dev-state
  cancel-in-progress: false

jobs:
  deploy-and-run-e2e:
    name: Terraform Deploy + Notebook E2E
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform/environments/batch-dev
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform/environments/batch-dev
        run: terraform apply -lock-timeout=20m -auto-approve

      - name: Capture API Outputs
        working-directory: ./terraform/environments/batch-dev
        run: |
          echo "E2E_API_BASE_URL=$(terraform output -raw api_gateway_url)" >> "$GITHUB_ENV"
          echo "E2E_API_KEY=$(terraform output -raw lifewatch_api_key)" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install E2E Test Dependencies
        run: python -m pip install --upgrade pip requests

      - name: Run Notebook E2E Test
        run: |
          python terraform/environments/batch-dev/e2e_notebook_run.py \
            --api-base-url "${E2E_API_BASE_URL}" \
            --api-key "${E2E_API_KEY}" \
            --notebook-path "demo_input/Data_cleaning.ipynb" \
            --data-file-path "demo_input/Template_MBO_Example_raw_v3.xlsx" \
            --environment-path "demo_input/environment.yaml" \
            --execution-profile "ec2_200gb" \
            --poll-interval-seconds 20 \
            --timeout-seconds 3600 \
            --output-dir "terraform/environments/batch-dev/e2e_outputs"

      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-e2e-artifacts
          path: terraform/environments/batch-dev/e2e_outputs
          if-no-files-found: warn

      - name: Terraform Destroy (Always Cleanup)
        if: always()
        working-directory: ./terraform/environments/batch-dev
        run: |
          terraform init
          terraform destroy -lock-timeout=20m -auto-approve

      - name: Verify No Batch EC2 Instances Remain
        if: always()
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            COUNT=$(aws ec2 describe-instances \
              --region "${AWS_REGION}" \
              --filters "Name=tag:Name,Values=lifewatch-batch-ec2-200gb" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
              --query "length(Reservations[].Instances[])" \
              --output text)
            if [ "${COUNT}" = "0" ]; then
              echo "No Batch EC2 instances remain."
              exit 0
            fi
            echo "Waiting for Batch EC2 cleanup... remaining instances: ${COUNT} (attempt ${attempt}/30)"
            sleep 20
          done
          echo "Batch EC2 cleanup check failed. Instances are still present."
          aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=lifewatch-batch-ec2-200gb" "Name=instance-state-name,Values=pending,running,stopping,stopped,shutting-down" \
            --query "Reservations[].Instances[].{Id:InstanceId,State:State.Name,LaunchTime:LaunchTime,AZ:Placement.AvailabilityZone}" \
            --output table
          exit 1
